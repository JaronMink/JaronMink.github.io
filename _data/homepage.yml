hero:
  title: '<span class="acronym">H</span>uman <span class="acronym">A</span>spects of cyber <span class="acronym">P</span>rotection &amp; <span class="acronym">P</span>rivac<span class="acronym">Y</span>'
  body: The Happy Lab studies how people shape the security, privacy, and real-world use of AI systems. We investigate where human factors create new vulnerabilities, where they unlock better defenses, and how to build safer AI systems in practice.
  primary_cta:
    label: Explore Publications
    href: /publication/
  secondary_cta:
    label: Meet the Lab
    href: /people/

